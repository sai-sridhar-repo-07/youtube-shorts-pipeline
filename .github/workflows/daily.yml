name: Daily YouTube Shorts

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST  (02:30 UTC)
    - cron: '30 6 * * *'   # 12:00 PM IST (06:30 UTC)
    - cron: '30 11 * * *'  # 5:00 PM IST  (11:30 UTC)
    - cron: '30 16 * * *'  # 10:00 PM IST (16:30 UTC)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install FFmpeg, fonts and espeak-ng
        run: sudo apt-get update && sudo apt-get install -y --fix-missing ffmpeg fonts-dejavu-core fonts-liberation espeak-ng

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore config and YouTube token
        run: |
          mkdir -p ~/.shorts-pipeline
          echo "${{ secrets.PIPELINE_CONFIG_B64 }}" | base64 -d > ~/.shorts-pipeline/config.json
          echo "${{ secrets.YOUTUBE_TOKEN_B64 }}"   | base64 -d > ~/.shorts-pipeline/youtube_token.json
          chmod 600 ~/.shorts-pipeline/config.json
          chmod 600 ~/.shorts-pipeline/youtube_token.json

      - name: Run pipeline
        run: python -m pipeline run --discover --auto-pick

      - name: Show output video path
        run: ls -lh ~/.shorts-pipeline/jobs/*/final_*.mp4 | tail -1
